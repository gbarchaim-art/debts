<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול הוצאות משפחתי</title>
    <style>
        body { font-family: Arial, sans-serif; background-color: #f4f7f6; margin: 0; padding: 20px; color: #333; }
        .container { max-width: 800px; margin: 0 auto; background: #fff; padding: 20px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1, h2 { text-align: center; color: #2c3e50; }
        select, input[type="text"], input[type="number"] { width: 100%; padding: 10px; margin: 10px 0; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        .checkbox-group { margin: 10px 0; padding: 10px; background: #f9f9f9; border-radius: 4px; }
        .checkbox-item { margin: 8px 0; display: flex; align-items: center; }
        .checkbox-item input { margin-left: 10px; transform: scale(1.2); }
        button { background-color: #2ecc71; color: white; padding: 12px; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: #27ae60; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: right; }
        th { background-color: #34495e; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .summary-box { background: #ecf0f1; padding: 15px; border-radius: 4px; margin-top: 20px; }
        .loading { text-align: center; color: #7f8c8d; font-style: italic; }
    </style>
</head>
<body>

<div class="container">
    <h1>ניהול הוצאות משפחתי</h1>
    
    <h2>הוספת הוצאה חדשה</h2>
    <form id="expenseForm">
        <label>שם האירוע / המוצר:</label>
        <input type="text" id="eventName" required placeholder="לדוגמה: קניות, מתנה...">

        <label>מי שילם?</label>
        <select id="payer" required>
            <option value="חיים">חיים</option>
            <option value="שמוליק ואסתי">שמוליק ואסתי</option>
            <option value="אליהו ושרה">אליהו ושרה</option>
            <option value="צבי ואילה">צבי ואילה</option>
            <option value="אברימי ושני">אברימי ושני</option>
            <option value="יעקב ושני">יעקב ושני</option>
            <option value="רחלי">רחלי</option>
            <option value="דניאל">דניאל</option>
        </select>

        <label>סכום כולל (ב-₪):</label>
        <input type="number" id="amount" step="0.01" required placeholder="0.00">

        <label>מי משתתף בהוצאה?</label>
        <div class="checkbox-group">
            <div class="checkbox-item"><input type="checkbox" class="participant" value="חיים" checked> <span>חיים</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="שמוליק ואסתי" checked> <span>שמוליק ואסתי</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="אליהו ושרה" checked> <span>אליהו ושרה</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="צבי ואילה" checked> <span>צבי ואילה</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="אברימי ושני" checked> <span>אברימי ושני</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="יעקב ושני" checked> <span>יעקב ושני</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="רחלי" checked> <span>רחלי</span></div>
            <div class="checkbox-item"><input type="checkbox" class="participant" value="דניאל" checked> <span>דניאל</span></div>
        </div>

        <button type="submit" id="submitBtn">שמור הוצאה</button>
    </form>

    <div class="summary-box">
        <h2>מצב החשבון הכללי בקבוצה</h2>
        <div id="balanceStatus">טוען נתונים...</div>
    </div>

    <h2>היסטוריית הוצאות</h2>
    <div id="loadingText" class="loading">טוען את רשימת ההוצאות...</div>
    <table id="expensesTable" style="display:none;">
        <thead>
            <tr>
                <th>אירוע</th>
                <th>שילם</th>
                <th>סכום</th>
                <th>משתתפים</th>
            </tr>
        </thead>
        <tbody id="tableBody"></tbody>
    </table>
</div>

<script>
    // הקישור הישן והטוב שלך
    const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbzyON3YIT0LIK9ZmhD59ZhtJ1gODMJ8QD5mlFtE-0HnWwFs2XJ9T6jZ_XedUTGoVg7fig/exec"; 
    
    let allData = [];
    const allUsers = ["חיים", "שמוליק ואסתי", "אליהו ושרה", "צבי ואילה", "אברימי ושני", "יעקב ושני", "רחלי", "דניאל"];

    window.onload = function() {
        fetchData();
    }

    document.getElementById("expenseForm").addEventListener("submit", function(e) {
        e.preventDefault();
        const submitBtn = document.getElementById("submitBtn");
        submitBtn.disabled = true;
        submitBtn.innerText = "שומר...";

        const eventName = document.getElementById("eventName").value;
        const payer = document.getElementById("payer").value;
        const amount = parseFloat(document.getElementById("amount").value);
        
        let participants = [];
        document.querySelectorAll(".participant:checked").forEach(cb => { participants.push(cb.value); });

        const payload = { action: "add", eventName: eventName, payer: payer, amount: amount, participants: participants.join(",") };

        fetch(WEB_APP_URL, {
            method: "POST",
            mode: "no-cors",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(payload)
        }).then(() => {
            alert("ההוצאה נשמרה בהצלחה!");
            document.getElementById("expenseForm").reset();
            submitBtn.disabled = false;
            submitBtn.innerText = "שמור הוצאה";
            fetchData();
        }).catch(err => {
            alert("שגיאה בשמירת הנתונים");
            submitBtn.disabled = false;
            submitBtn.innerText = "שמור הוצאה";
        });
    });

    function fetchData() {
        fetch(WEB_APP_URL + "?action=get")
        .then(res => res.json())
        .then(data => {
            allData = data;
            renderData();
        })
        .catch(err => { console.error("שגיאה בקבלת נתונים", err); });
    }

    function renderData() {
        const tbody = document.getElementById("tableBody");
        tbody.innerHTML = "";
        let balances = {};
        allUsers.forEach(u => balances[u] = 0);

        allData.forEach(row => {
            const amount = parseFloat(row.amount);
            const rowPayer = row.payer;
            const rowParticipants = row.participants ? row.participants.split(",") : [];
            
            const share = amount / rowParticipants.length;
            if (balances[rowPayer] !== undefined) balances[rowPayer] += amount;
            rowParticipants.forEach(p => {
                if (balances[p] !== undefined) balances[p] -= share;
            });

            const tr = document.createElement("tr");
            tr.innerHTML = `<td>${row.eventName}</td><td>${rowPayer}</td><td>₪${amount.toFixed(2)}</td><td>${rowParticipants.join(", ")}</td>`;
            tbody.appendChild(tr);
        });

        document.getElementById("loadingText").style.display = "none";
        document.getElementById("expensesTable").style.display = "table";
        
        updateBalanceUI(balances);
    }

    function updateBalanceUI(balances) {
        const balanceDiv = document.getElementById("balanceStatus");
        let html = "<ul>";
        for (let user in balances) {
            const b = balances[user];
            if (b > 0) {
                html += `<li><strong>${user}</strong>: מגיע לו <span style="color:#27ae60;">₪${b.toFixed(2)}</span></li>`;
            } else if (b < 0) {
                html += `<li><strong>${user}</strong>: חייב <span style="color:#e74c3c;">₪${Math.abs(b).toFixed(2)}</span></li>`;
            } else {
                html += `<li><strong>${user}</strong>: מאוזן</li>`;
            }
        }
        html += "</ul>";
        balanceDiv.innerHTML = html;
    }

    setInterval(fetchData, 15000);
</script>

</body>
</html>
